<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rutinas – Vital Gym Admin</title>
  <link rel="stylesheet" href="app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .routine-card { background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all var(--transition); }
    .routine-card:hover { border-color:var(--border-light); }
    .day-builder { background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px; }
    .ex-selector { display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap; }
    .ex-selector select { flex:1;min-width:160px; }
  </style>
</head>
<body>
<div class="app-container">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><img src="img/transparent-Photoroom.png" alt="Vital Gym"></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Admin</div>
      <a href="dashboard-admin.html" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
      <a href="admin-usuarios.html" class="nav-item"><i class="fas fa-users"></i><span>Usuarios</span></a>
      <a href="admin-rutinas.html" class="nav-item active"><i class="fas fa-calendar-alt"></i><span>Rutinas</span></a>
      <a href="admin-ejercicios.html" class="nav-item"><i class="fas fa-dumbbell"></i><span>Ejercicios</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUser"></div>
      <button class="btn-logout" onclick="VG.logout()"><i class="fas fa-sign-out-alt"></i><span>Cerrar sesión</span></button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <main class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
        <span class="topbar-title">RUTINAS</span>
      </div>
      <div class="topbar-right">
        <div class="topbar-avatar" id="topbarAvatar">A</div>
      </div>
    </header>

    <div class="page-body">
      <div class="section-gap fade-in" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <h2 style="font-family:var(--font-head);font-size:2rem;color:var(--text-1);letter-spacing:1px">GESTIÓN DE RUTINAS</h2>
          <p style="color:var(--text-3);font-size:0.85rem;margin-top:4px" id="routineCount"></p>
        </div>
        <button class="btn btn-primary" onclick="openCreateMode()"><i class="fas fa-plus"></i> Nueva rutina</button>
      </div>

      <!-- ROUTINE LIST -->
      <div id="listView">
        <div class="grid-auto" id="routineGrid"></div>
      </div>

      <!-- CREATE/EDIT FORM -->
      <div id="editView" style="display:none">
        <div class="card fade-in">
          <div class="card-header">
            <div class="card-title" id="formTitle"><i class="fas fa-plus" style="color:var(--primary)"></i> Nueva rutina</div>
            <button class="btn btn-outline btn-sm" onclick="backToList()"><i class="fas fa-arrow-left"></i> Volver</button>
          </div>

          <div style="display:flex;flex-direction:column;gap:20px">
            <!-- BASIC INFO -->
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px;background:var(--bg-3);border-radius:var(--radius-sm)">
              <div class="form-group">
                <label class="form-label">Nombre de la rutina *</label>
                <input type="text" id="rName" class="form-input" placeholder="Ej: Avanzado – 5 días Push/Pull">
              </div>
              <div class="form-group">
                <label class="form-label">Nivel</label>
                <select id="rLevel" class="form-select">
                  <option value="inicial">Inicial</option>
                  <option value="intermedio">Intermedio</option>
                  <option value="avanzado">Avanzado</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Objetivo</label>
                <select id="rObjective" class="form-select">
                  <option value="volumen">Volumen muscular</option>
                  <option value="fuerza">Fuerza</option>
                  <option value="definicion">Definición</option>
                  <option value="resistencia">Resistencia</option>
                  <option value="hipertrofia">Hipertrofia</option>
                </select>
              </div>
            </div>

            <!-- DAYS BUILDER -->
            <div>
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <div style="font-family:var(--font-head);font-size:1.1rem;color:var(--text-1)">DÍAS DE ENTRENAMIENTO</div>
                <button class="btn btn-outline btn-sm" onclick="addDay()"><i class="fas fa-plus"></i> Agregar día</button>
              </div>
              <div id="daysContainer"></div>
            </div>

            <div id="formError" class="alert alert-error" style="display:none"></div>
            <div style="display:flex;gap:10px;justify-content:flex-end">
              <button class="btn btn-outline" onclick="backToList()">Cancelar</button>
              <button class="btn btn-primary" onclick="saveRoutine()"><i class="fas fa-save"></i> Guardar rutina</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="dashboard-admin.html" class="bottom-nav-item"><i class="fas fa-th-large"></i><span>Panel</span></a>
      <a href="admin-usuarios.html" class="bottom-nav-item"><i class="fas fa-users"></i><span>Usuarios</span></a>
      <a href="admin-rutinas.html" class="bottom-nav-item active"><i class="fas fa-calendar-alt"></i><span>Rutinas</span></a>
      <a href="admin-ejercicios.html" class="bottom-nav-item"><i class="fas fa-dumbbell"></i><span>Ejercicios</span></a>
    </div>
  </nav>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmDelete">
  <div class="confirm-box">
    <i class="fas fa-trash-alt"></i>
    <h3>Eliminar rutina</h3>
    <p>¿Estás seguro? Esta acción no se puede deshacer.</p>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-outline" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script src="app.js"></script>
<script>
let editingId = null;
let deletingId = null;
let days = [];

document.addEventListener('DOMContentLoaded', () => {
  VG.init();
  VG.guard();
  VG.adminGuard();
  const u = VG.me();
  const initials = u.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('topbarAvatar').textContent = initials;
  document.getElementById('sidebarUser').innerHTML = `
    <div class="sidebar-user-avatar">${initials}</div>
    <div class="sidebar-user-info"><div class="sidebar-user-name">${u.name}</div><div class="sidebar-user-role">Administrador</div></div>`;
  renderRoutines();
});

function renderRoutines() {
  const routines = VG.routines();
  document.getElementById('routineCount').textContent = `${routines.length} rutinas disponibles`;
  const grid = document.getElementById('routineGrid');
  if (!routines.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-calendar-times"></i><h3>Sin rutinas</h3><p>Creá la primera rutina para asignarla a tus usuarios.</p></div>`;
    return;
  }
  grid.innerHTML = routines.map(r => {
    const assignedCount = VG.users().filter(u=>u.routineId===r.id).length;
    const levelColors = {inicial:'badge-blue',intermedio:'badge-yellow',avanzado:'badge-red'};
    return `<div class="routine-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px">
        <div style="font-weight:600;color:var(--text-1);line-height:1.3">${r.name}</div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-icon btn-ghost btn-sm" onclick="openEditMode('${r.id}')" title="Editar"><i class="fas fa-edit"></i></button>
          <button class="btn btn-icon btn-sm" style="background:var(--danger-bg);color:var(--danger);border:none" onclick="openDelete('${r.id}')" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
        <span class="badge ${levelColors[r.level]||'badge-gray'}">${VG.levelLabel(r.level)}</span>
        <span class="badge badge-gray">${VG.objLabel(r.objective)}</span>
      </div>
      <div style="display:flex;gap:16px;margin-bottom:14px">
        <div><div style="font-family:var(--font-head);font-size:1.4rem;color:var(--text-1)">${r.days.length}</div><div style="font-size:0.72rem;color:var(--text-3)">Días</div></div>
        <div><div style="font-family:var(--font-head);font-size:1.4rem;color:var(--text-1)">${r.days.reduce((a,d)=>a+d.exercises.length,0)}</div><div style="font-size:0.72rem;color:var(--text-3)">Ejercicios</div></div>
        <div><div style="font-family:var(--font-head);font-size:1.4rem;color:var(--primary)">${assignedCount}</div><div style="font-size:0.72rem;color:var(--text-3)">Usuarios</div></div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:12px;display:flex;flex-wrap:wrap;gap:4px">
        ${r.days.map(d=>`<span class="tag" style="font-size:0.7rem">${d.name}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function openCreateMode() {
  editingId = null;
  days = [{ name:'Día 1', exercises:[] }];
  document.getElementById('formTitle').innerHTML = '<i class="fas fa-plus" style="color:var(--primary)"></i> Nueva rutina';
  document.getElementById('rName').value = '';
  document.getElementById('rLevel').value = 'inicial';
  document.getElementById('rObjective').value = 'volumen';
  document.getElementById('formError').style.display = 'none';
  document.getElementById('listView').style.display = 'none';
  document.getElementById('editView').style.display = 'block';
  renderDays();
}

function openEditMode(id) {
  const r = VG.getRoutine(id);
  if (!r) return;
  editingId = id;
  days = JSON.parse(JSON.stringify(r.days));
  document.getElementById('formTitle').innerHTML = `<i class="fas fa-edit" style="color:var(--primary)"></i> Editando: ${r.name}`;
  document.getElementById('rName').value = r.name;
  document.getElementById('rLevel').value = r.level;
  document.getElementById('rObjective').value = r.objective;
  document.getElementById('formError').style.display = 'none';
  document.getElementById('listView').style.display = 'none';
  document.getElementById('editView').style.display = 'block';
  renderDays();
}

function backToList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('editView').style.display = 'none';
  renderRoutines();
}

function addDay() {
  days.push({ name:`Día ${days.length+1}`, exercises:[] });
  renderDays();
}

function removeDay(idx) {
  days.splice(idx, 1);
  renderDays();
}

function addExercise(dayIdx) {
  days[dayIdx].exercises.push({ exerciseId:'', sets:3, reps:12, rest:60 });
  renderDays();
}

function removeExercise(dayIdx, exIdx) {
  days[dayIdx].exercises.splice(exIdx,1);
  renderDays();
}

function renderDays() {
  const exercises = VG.exercises();
  const container = document.getElementById('daysContainer');
  container.innerHTML = days.map((day, di) => `
    <div class="day-builder">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <input type="text" value="${day.name}" class="form-input" style="flex:1" onchange="days[${di}].name=this.value" placeholder="Nombre del día">
        <button class="btn btn-icon btn-sm" style="background:var(--danger-bg);color:var(--danger);border:none;flex-shrink:0" onclick="removeDay(${di})"><i class="fas fa-times"></i></button>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px">
        ${day.exercises.map((ex, ei) => `
          <div class="ex-selector">
            <select class="form-select" onchange="days[${di}].exercises[${ei}].exerciseId=this.value">
              <option value="">Seleccionar ejercicio</option>
              ${exercises.map(e=>`<option value="${e.id}" ${ex.exerciseId===e.id?'selected':''}>${e.name} (${e.muscleGroup})</option>`).join('')}
            </select>
            <input type="number" class="form-input" style="width:70px" placeholder="Series" value="${ex.sets||3}" min="1" max="10" onchange="days[${di}].exercises[${ei}].sets=parseInt(this.value)">
            <input type="number" class="form-input" style="width:70px" placeholder="Reps" value="${ex.reps||12}" min="1" onchange="days[${di}].exercises[${ei}].reps=parseInt(this.value)">
            <input type="number" class="form-input" style="width:80px" placeholder="Descanso(s)" value="${ex.rest||60}" min="0" onchange="days[${di}].exercises[${ei}].rest=parseInt(this.value)">
            <button class="btn btn-icon btn-ghost btn-sm" onclick="removeExercise(${di},${ei})"><i class="fas fa-times"></i></button>
          </div>`).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" onclick="addExercise(${di})" style="width:100%;border:1px dashed var(--border);color:var(--text-3)">
        <i class="fas fa-plus"></i> Agregar ejercicio
      </button>
    </div>`).join('');
}

function saveRoutine() {
  const name = document.getElementById('rName').value.trim();
  if (!name) return showFormError('El nombre de la rutina es obligatorio.');
  if (!days.length) return showFormError('Agregá al menos un día.');
  const data = {
    name,
    level: document.getElementById('rLevel').value,
    objective: document.getElementById('rObjective').value,
    days: days.map(d => ({ ...d, id: d.id || ('day-'+Date.now()+Math.random().toString(36).slice(2,5)) })),
  };
  if (editingId) {
    VG.updateRoutine(editingId, data);
    showToast('Rutina actualizada correctamente.');
  } else {
    VG.addRoutine(data);
    showToast('Rutina creada correctamente.');
  }
  backToList();
}

function showFormError(msg) {
  const el = document.getElementById('formError');
  el.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
  el.style.display = 'flex';
}

function openDelete(id) { deletingId=id; document.getElementById('confirmDelete').classList.add('open'); }
function closeConfirm() { document.getElementById('confirmDelete').classList.remove('open'); }
function confirmDelete() {
  if (!deletingId) return;
  VG.deleteRoutine(deletingId);
  closeConfirm();
  renderRoutines();
  showToast('Rutina eliminada.');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show','success');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}
</script>
</body>
</html>
